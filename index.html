<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mission Clock</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: #05070a;
    color: #8ffcff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    text-align: center;
    width: 95%;
    max-width: 520px;
}

.clock {
    font-size: 64px;
    margin: 20px 0;
}

.small {
    opacity: 0.7;
    font-size: 14px;
}

button {
    margin: 5px;
    padding: 10px 14px;
    border: 1px solid #8ffcff;
    background: transparent;
    color: #8ffcff;
    border-radius: 10px;
}

.panel {
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

    <div class="small" id="day">DAY 1</div>
    <div class="clock" id="time">00:00:00</div>
    <div class="small" id="mode">MODE: 1:6</div>

    <div class="panel">
        <button onclick="setSpeed(1)">1:1</button>
        <button onclick="setSpeed(6)">1:6</button>
    </div>

    <div class="panel">
        <button onclick="addHours(-1)">-1H</button>
        <button onclick="addHours(1)">+1H</button>
        <button onclick="addHours(6)">+6H</button>
        <button onclick="addHours(8)">+8H</button>
        <button onclick="addHours(24)">+1D</button>
    </div>

</div>

<script>
let speed = 6;
let offset = 0;

// спільний старт (однаковий для всіх пристроїв)
const START_TIME = 1760000000000;

function getGameSeconds() {
    const real = (Date.now() - START_TIME) / 1000;
    return Math.floor(real * speed + offset);
}

function render() {
    let total = getGameSeconds();

    let days = Math.floor(total / 86400);
    let r = total % 86400;

    let h = Math.floor(r / 3600);
    r %= 3600;

    let m = Math.floor(r / 60);
    let s = r % 60;

    document.getElementById("time").innerText =
        String(h).padStart(2,'0') + ":" +
        String(m).padStart(2,'0') + ":" +
        String(s).padStart(2,'0');

    document.getElementById("day").innerText = "DAY " + (days + 1);
    document.getElementById("mode").innerText = "MODE: 1:" + speed;
}

function setSpeed(v) {
    speed = v;
}

function addHours(h) {
    offset += h * 3600;
}

setInterval(render, 1000);
render();
</script>

</body>
</html>
